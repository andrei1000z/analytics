<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <!-- Deep EU blue base with subtle vignette -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0050D4"/>
      <stop offset="0.5" stop-color="#003399"/>
      <stop offset="1" stop-color="#001A52"/>
    </linearGradient>

    <!-- Liquid Glass top refraction -->
    <linearGradient id="topGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="0.22" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Yellow EU palette — rich, multi-stop for depth -->
    <linearGradient id="yellowBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE56B"/>
      <stop offset="0.45" stop-color="#FFCC00"/>
      <stop offset="1" stop-color="#E6B500"/>
    </linearGradient>

    <!-- Glass overlay on each bar — top sheen + bottom darkening -->
    <linearGradient id="barSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="0.18" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.85" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#7A4F00" stop-opacity="0.18"/>
    </linearGradient>

    <!-- Yellow glow halo behind the tallest bar -->
    <radialGradient id="accentGlow" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#FFCC00" stop-opacity="0.45"/>
      <stop offset="0.55" stop-color="#FFCC00" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#FFCC00" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft drop shadow under the bars — tactile depth -->
    <filter id="barShadow" x="-30%" y="-10%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.55"/>
      </feComponentTransfer>
      <feComposite in2="SourceAlpha" operator="out"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square base -->
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- Faint EU stars constellation (8 stars, top arc) -->
  <g fill="#FFFFFF" opacity="0.07">
    <circle cx="160" cy="240" r="6"/>
    <circle cx="220" cy="180" r="5"/>
    <circle cx="312" cy="148" r="6"/>
    <circle cx="430" cy="124" r="5"/>
    <circle cx="600" cy="124" r="5"/>
    <circle cx="720" cy="148" r="6"/>
    <circle cx="812" cy="180" r="5"/>
    <circle cx="864" cy="240" r="6"/>
  </g>

  <!-- Liquid Glass top refraction (over base, under bars) -->
  <rect width="1024" height="1024" rx="232" fill="url(#topGloss)"/>

  <!-- Yellow accent halo behind tallest bar -->
  <ellipse cx="780" cy="380" rx="280" ry="240" fill="url(#accentGlow)"/>

  <!-- Three yellow rising bars — analytics chart motif -->
  <g filter="url(#barShadow)">
    <!-- Bar 1 (shortest) -->
    <rect x="232" y="608" width="156" height="208" rx="46" fill="url(#yellowBar)"/>
    <!-- Bar 2 (medium) -->
    <rect x="434" y="448" width="156" height="368" rx="46" fill="url(#yellowBar)"/>
    <!-- Bar 3 (tallest) -->
    <rect x="636" y="240" width="156" height="576" rx="46" fill="url(#yellowBar)"/>
  </g>

  <!-- Glass sheen layer on each bar (top white highlight + bottom darken) -->
  <rect x="232" y="608" width="156" height="208" rx="46" fill="url(#barSheen)"/>
  <rect x="434" y="448" width="156" height="368" rx="46" fill="url(#barSheen)"/>
  <rect x="636" y="240" width="156" height="576" rx="46" fill="url(#barSheen)"/>

  <!-- Subtle outline on bars for crispness at small sizes -->
  <rect x="232" y="608" width="156" height="208" rx="46" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.12"/>
  <rect x="434" y="448" width="156" height="368" rx="46" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.12"/>
  <rect x="636" y="240" width="156" height="576" rx="46" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.12"/>

  <!-- Hairline outer ring — tactile glass edge -->
  <rect width="1024" height="1024" rx="232" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.10"/>
</svg>
