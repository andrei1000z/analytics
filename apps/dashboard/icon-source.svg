<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <!-- Deep EU blue base — vignette top-light to bottom-dark for depth -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0050D4"/>
      <stop offset="0.5" stop-color="#003399"/>
      <stop offset="1" stop-color="#001A52"/>
    </linearGradient>

    <!-- Liquid Glass top refraction over the whole canvas -->
    <linearGradient id="topGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="0.22" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Diagonal sweep highlight (subtle "wet" glass feel) -->
    <linearGradient id="diagSweep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="0.4" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Yellow EU palette — glassy multi-stop -->
    <linearGradient id="yellowBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE872"/>
      <stop offset="0.4" stop-color="#FFCC00"/>
      <stop offset="1" stop-color="#D9A800"/>
    </linearGradient>

    <!-- Glass sheen on each bar — top white highlight + subtle bottom darken -->
    <linearGradient id="barSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="0.25" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.85" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#7A4F00" stop-opacity="0.22"/>
    </linearGradient>

    <!-- Yellow accent glow halo top-right -->
    <radialGradient id="accentGlow" cx="0.72" cy="0.28" r="0.55">
      <stop offset="0" stop-color="#FFCC00" stop-opacity="0.42"/>
      <stop offset="0.55" stop-color="#FFCC00" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#FFCC00" stop-opacity="0"/>
    </radialGradient>

    <!-- Tactile drop shadow under bars -->
    <filter id="barShadow" x="-15%" y="-15%" width="130%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16"/>
      <feOffset dx="0" dy="18"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feComposite in2="SourceAlpha" operator="out"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square base -->
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>

  <!-- Subtle EU stars constellation (8 stars, faint, in upper half) -->
  <g fill="#FFFFFF" opacity="0.06">
    <circle cx="160" cy="160" r="5"/>
    <circle cx="240" cy="120" r="4"/>
    <circle cx="350" cy="100" r="5"/>
    <circle cx="490" cy="92" r="4"/>
    <circle cx="640" cy="100" r="4"/>
    <circle cx="750" cy="120" r="5"/>
    <circle cx="850" cy="160" r="4"/>
    <circle cx="900" cy="220" r="3"/>
  </g>

  <!-- Top gloss refraction (above stars, below bars) -->
  <rect width="1024" height="1024" rx="232" fill="url(#topGloss)"/>

  <!-- Yellow accent halo top-right -->
  <ellipse cx="760" cy="270" rx="320" ry="240" fill="url(#accentGlow)"/>

  <!-- Three horizontal yellow bars — left-aligned, decreasing width -->
  <!-- Layout: 3 bars × 152h, 28 gap, vertically centered. Bar radius = 76 (full pill ends). -->
  <g filter="url(#barShadow)">
    <!-- Top: widest -->
    <rect x="200" y="244" width="608" height="152" rx="76" fill="url(#yellowBar)"/>
    <!-- Middle: medium -->
    <rect x="200" y="436" width="448" height="152" rx="76" fill="url(#yellowBar)"/>
    <!-- Bottom: shortest -->
    <rect x="200" y="628" width="272" height="152" rx="76" fill="url(#yellowBar)"/>
  </g>

  <!-- Glass sheen overlay on each bar -->
  <rect x="200" y="244" width="608" height="152" rx="76" fill="url(#barSheen)"/>
  <rect x="200" y="436" width="448" height="152" rx="76" fill="url(#barSheen)"/>
  <rect x="200" y="628" width="272" height="152" rx="76" fill="url(#barSheen)"/>

  <!-- Hairline crispness on bars (visible at 16px) -->
  <rect x="200" y="244" width="608" height="152" rx="76" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.18"/>
  <rect x="200" y="436" width="448" height="152" rx="76" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.18"/>
  <rect x="200" y="628" width="272" height="152" rx="76" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.18"/>

  <!-- Diagonal "wet" glass sweep across the whole icon -->
  <rect width="1024" height="1024" rx="232" fill="url(#diagSweep)"/>

  <!-- Hairline outer ring — tactile glass edge -->
  <rect width="1024" height="1024" rx="232" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.12"/>
</svg>
